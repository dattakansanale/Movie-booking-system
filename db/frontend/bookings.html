<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - MovieBook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/bookings.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <nav class="navbar">
                <div class="logo">
                    <i class="fas fa-film"></i>
                    <span>MovieBook</span>
                </div>
                <div class="nav-links">
                    <a href="index.html" class="nav-link">
                        <i class="fas fa-home"></i> Home
                    </a>
                    <a href="movies.html" class="nav-link">
                        <i class="fas fa-film"></i> Movies
                    </a>
                    <a href="bookings.html" class="nav-link active">
                        <i class="fas fa-ticket-alt"></i> My Bookings
                    </a>
                    <div id="userSection">
                        <!-- User info will be loaded here -->
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <!-- Page Header -->
            <div class="page-header">
                <h1><i class="fas fa-ticket-alt"></i> My Bookings</h1>
                <p>Manage your movie ticket bookings</p>
            </div>

            <!-- Debug Info (remove in production) -->
            <div id="debugInfo" style="background: #f0f0f0; padding: 1rem; margin: 1rem 0; border-radius: 0.5rem; font-family: monospace; font-size: 0.9rem;">
                <strong>Debug Info:</strong><br>
                <span id="debugAuth">Checking authentication...</span><br>
                <span id="debugUser">Checking user...</span><br>
                <span id="debugToken">Checking token...</span>
            </div>

            <!-- Loading State -->
            <div id="bookingsLoading" class="loading">
                <div class="spinner"></div>
                <p>Loading your bookings...</p>
            </div>

            <!-- Bookings List -->
            <div id="bookingsList" class="bookings-list" style="display: none;">
                <!-- Bookings will be loaded here -->
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state" style="display: none;">
                <i class="fas fa-ticket-alt"></i>
                <h3>No bookings found</h3>
                <p>You haven't booked any movies yet. Start exploring!</p>
                <a href="movies.html" class="btn btn-primary">
                    <i class="fas fa-film"></i> Browse Movies
                </a>
            </div>
        </div>
    </main>

    <!-- Toast Notifications -->
    <div id="toast" class="toast"></div>

    <script>
        // Debug info update
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                const debugAuth = document.getElementById("debugAuth")
                const debugUser = document.getElementById("debugUser")
                const debugToken = document.getElementById("debugToken")
                
                if (debugAuth) debugAuth.textContent = `Authenticated: ${window.isAuthenticated ? window.isAuthenticated() : 'Function not available'}`
                if (debugUser) debugUser.textContent = `User: ${window.getCurrentUser ? JSON.stringify(window.getCurrentUser()) : 'Function not available'}`
                if (debugToken) debugToken.textContent = `Token: ${window.getAuthToken ? (window.getAuthToken() ? 'Present' : 'Missing') : 'Function not available'}`
            }, 100)
        })
    </script>
    <script src="js/auth.js"></script>
    <script src="js/bookings.js"></script>
</body>
</html>
